<!DOCTYPE html>
<html>
    <head>
        <title>Registrar's Office Class Search</title>

        <script src=
        "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
        </script>

        
        <link rel="stylesheet" href=
         "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <link rel="stylesheet" href="style.css">

    </head>

    <body>
        <!--sticky header : class search and inputs -->
        <hr>
        <div class="header">
            <h1>Registrar's Office Class Search</h1>
            <hr>
            <form>
                <div class="form-input">
                    <div class="form-cell">
                        <input id="deptInput" type="text" name="dept" value="" placeholder="Department" autofocus>
                    </div>

                    <div class="form-cell">
                        <input id="coursenumInput" type="text" name="coursenum" placeholder="Number" value="">
                    </div>

                    <div class="form-cell">
                        <input id="areaInput" type="text" name="area" placeholder="Area" value="">
                    </div>

                    <div class="form-cell">
                        <input id="titleInput" type="text" name="title" placeholder="Title" value="">
                    </div>
                </div>
            </form>
            <hr>
        </div>
        <!-- shows the course results from the input-->
        <div id="resultsDiv"></div>

        <div class="modal" id="detailsModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Registrar's Office</h4>
                            <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="detailsModalBody">
                        <h2>hello</h2>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-danger" data-bs-dismiss="modal">
                            Close
                        </button>
                    </div>
                    </div>
                </div>
            </div>
        </div>

        <hr>
        <div class="footer">
        Created by Mohemeen Ahmed and Amel Osman.
        </div>
        <hr>
        <!-- end of html code-->

        <!-- start of javascript code-->
        <script src=
            "https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js">
        </script>

        <script>
            'use strict';

            
            function convertToHtmlOverviews(overviews) {
                let template = `
                <table class="table table-striped">
                <thead>
                    <tr>
                        <td><b>ClassId</b></td>
                        <td><b>Dept</b></td>
                        <td><b>Num</b></td>
                        <td><b>Area</b></td>
                        <td><b>Title</b></td>
                    </tr>
                </thead>
                <tbody>
                    {{#overviews}}
                    <tr>
                        <td><button id="buttonclassid" onclick="getResultsDetails('{{classid}}')">{{classid}}</button></td>
                        <td>{{dept}}</td>
                        <td>{{coursenum}}</td>
                        <td>{{area}}</td>
                        <td>{{title}}</td>
                    </tr>
                    {{/overviews}}
                </tbody>
                </table>
                `;
                let map = {overviews: overviews}
                let html = Mustache.render(template, map);
                return html;
            }

            function convertToHtmlDetails(details) {
                let template = `
                {{#details}}
                <table class="table table-striped">
                    <tbody>
                        <h2> Class Details </h2>
                        <tr>
                            <td><strong>Class Id</strong></td>
                            <td>{{classid}}</td>
                        </tr>
                        <tr>
                            <td><strong>Days</strong></td>
                            <td>{{days}}</td>
                        </tr>
                        <tr>
                            <td><strong>Start time</strong></td>
                            <td>{{starttime}}</td>
                        </tr>
                        <tr>
                            <td><strong>End time</strong></td>
                            <td>{{endtime}}</td>   
                        </tr>
                        <tr>
                            <td><strong>Building</strong></td>
                            <td>{{bldg}}</td>
                        </tr>
                        <tr>
                            <td><strong>Room</strong></td>
                            <td>{{roomnum}}</td>
                        </tr>
                    </tbody>
                </table>

                <table class="table table-striped">
                    <tbody>
                        <h2> Course Details </h2>
                        <tr>
                            <td><strong>Course Id</strong></td>
                            <td>{{courseid}}</td>
                        </tr>
                        {{#deptcoursenums}}
                            <tr>
                                <td><strong>Dept and Number</strong></td>
                                <td>{{dept}} {{coursenum}}</td>
                            </tr>
                        {{/deptcoursenums}}
                        
                        <tr>
                            <td><strong>Area</strong></td>
                            <td>{{area}}</td>
                        </tr>
                        <tr>
                            <td><strong>Title</strong></td>
                            <td>{{title}}</td>   
                        </tr>
                        <tr>
                            <td><strong>Description</strong></td>
                            <td>{{descrip}}</td>
                        </tr>
                        <tr>
                            <td><strong>Prerequisites</strong></td>
                            <td>{{prereqs}}</td>
                        </tr>
                        {{#profnames}}
                            <tr>
                                <td><strong>Professor</strong></td>
                                <td>{{profname}}</td>
                            </tr>
                        {{/profnames}}
                    </tbody>
                </table>
                {{/details}}

                `;
                let map = {details: details}
                let html = Mustache.render(template, map);
                return html;
            }
        


            function handleOverviewsResponse(){
                if(this.status !== 200){
                    alert('Error: Failed to fetch data from server');
                    return
                }

                let overviews = JSON.parse(this.response);
                let htmlOverviews = convertToHtmlOverviews(overviews);
                let resultsDiv = document.getElementById('resultsDiv');
                resultsDiv.innerHTML = htmlOverviews;
            }

            function handleDetailsResponse(){
                if(this.status !== 200){
                    alert('Error: Failed to fetch data from server');
                    return
                }
                let details = JSON.parse(this.response);
                let htmlDetails = convertToHtmlDetails(details);
                let detailsModalBodyNode = document.getElementById('detailsModalBody');
                detailsModalBodyNode.innerHTML = htmlDetails;
                let detailsModalNode = document.getElementById('detailsModal');
                let detailsModal = new bootstrap.Modal(detailsModalNode);
                detailsModal.show();
               
            }

            function handleError(){
                alert('Error: failed to fetch data from server');
            }
            let request = null;

            function getOverviewsResults(){
                let deptInput = document.getElementById('deptInput');
                let dept = deptInput.value;
                let encodedDept = encodeURIComponent(dept);

                let coursenumInput = document.getElementById('coursenumInput');
                let coursenum = coursenumInput.value;
                let encodedCourseNum = encodeURIComponent(coursenum);

                let areaInput = document.getElementById('areaInput');
                let area = areaInput.value;
                let encodedArea = encodeURIComponent(area);

                let titleInput = document.getElementById('titleInput');
                let title = titleInput.value;
                let encodedTitle = encodeURIComponent(title);

                let url = '/searchresults?dept=' + encodedDept + '&coursenum=' + encodedCourseNum + '&area=' +
                encodedArea + '&title=' + encodedTitle;

                if (request !== null)
                    request.abort();

                request = new XMLHttpRequest();
                request.onload = handleOverviewsResponse;
                request.onerror = handleError;
                request.open('GET', url);
                request.send();
            }

            function getResultsDetails(classid){
                
                let encodedClassId = encodeURIComponent(classid);
                let url = '/regdetails?classid=' + encodedClassId;

                if (request !== null)
                    request.abort();

                request = new XMLHttpRequest();
                request.onload = handleDetailsResponse;
                request.onerror = handleError;
                request.open('GET', url);
                request.send();
            }

            let timer = null;

            function debouncedGetResults() {
                clearTimeout(timer);
                timer = window.setTimeout(getOverviewsResults, 500);
            }

            function setup(){
                let deptInput = document.getElementById('deptInput'); 
                let coursenumInput = document.getElementById('coursenumInput');
                let areaInput = document.getElementById('areaInput');
                let titleInput = document.getElementById('titleInput'); 
                deptInput.addEventListener('input', debouncedGetResults);
                coursenumInput.addEventListener('input', debouncedGetResults);
                areaInput.addEventListener('input', debouncedGetResults);
                titleInput.addEventListener('input', debouncedGetResults);
                getOverviewsResults();
            }

            document.addEventListener('DOMContentLoaded', setup);
        </script>

        <style>
           .header{
            background-color:navy;
           }
        </style>
    </body>
</html>
